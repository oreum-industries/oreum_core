name: test

# trigger only when a PR is opened, reopened, or marked ready for review, or on manual request
on:
  pull_request:
    branches: [master]
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

# use lowest perms
permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write

# concurrency: cancel same job already in-progress, to be efficient
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test - Run pytest suite
    timeout-minutes: 5
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: ["ubuntu-latest"]
        python-version: ["3.13"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup python env ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run pytest suite with coverage and generate badge
        run: mkdir -p reports && make test CI=1

      - name: Publish test results to PR
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/test-report.xml

      - name: Publish coverage report to PR
        uses: orgoro/coverage@v3.2
        if: always() && github.event_name == 'pull_request'
        with:
          coverageFile: reports/coverage-report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.6   # overall floor; raise as coverage improves
          thresholdNew: 0.7   # new files added in a PR must be well-tested
          thresholdModified: 0.5  # modified files must maintain coverage

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: reports/coverage-report.xml
          retention-days: 30
