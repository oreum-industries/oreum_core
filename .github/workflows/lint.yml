name: lint

# trigger on PRs into master and pushes to master, or on manual request
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

# use lowest perms
permissions:
  actions: read
  checks: write
  contents: write
  pull-requests: read

# concurrency: cancel same job already in-progress, to be efficient
concurrency:
    group: ${{ github.workflow }}-${{  github.ref }}
    cancel-in-progress: true

jobs:
  lint:
    name: lint - Run checks of code lint, format and static security
    timeout-minutes: 5
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: ["ubuntu-latest"]
        python-version: ["3.13"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup python env ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run checks of code lint, format and static security
        run: mkdir -p reports assets/img && make lint CI=1

      - name: Push interrogate badge to badges branch
        if: github.ref == 'refs/heads/master'
        run: |
          cp assets/img/interrogate_badge.svg /tmp/interrogate_badge.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin badges; then
            git fetch origin badges
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet
          fi
          mkdir -p assets/img
          cp /tmp/interrogate_badge.svg assets/img/
          git add assets/img/interrogate_badge.svg
          git diff --staged --quiet || git commit -m "ci: update interrogate badge [skip ci]"
          git push origin badges
          git checkout -

      - name: Upload static security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: upload-security-report
          path: reports/bandit-report.json
          retention-days: 90
